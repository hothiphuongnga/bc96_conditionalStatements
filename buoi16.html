        <!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Máy tính cơ bản</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="calculator">
    <h1>Máy tính cơ bản</h1>

    <!-- Màn hình hiển thị -->
    <div class="screen">
      <div id="history" class="history"></div>

      <input
        id="display"
        class="display"
        type="text"
        value="0"
        readonly
      />
    </div>

    <!-- Khu vực bàn phím -->
    <div class="keyboard">
      <button
        class="btn btn-function"
        onclick="xoaTatCa()"
      >
        AC
      </button>

      <button
        class="btn btn-function"
        onclick="xoaMotKyTu()"
      >
        DEL
      </button>

      <button
        class="btn btn-operator"
        onclick="chonPhepTinh('%')"
      >
        %
      </button>

      <button
        class="btn btn-operator"
        onclick="chonPhepTinh('/')"
      >
        ÷
      </button>

      <button
        class="btn"
        onclick="nhapSo('7')"
      >
        7
      </button>

      <button
        class="btn"
        onclick="nhapSo('8')"
      >
        8
      </button>

      <button
        class="btn"
        onclick="nhapSo('9')"
      >
        9
      </button>

      <button
        class="btn btn-operator"
        onclick="chonPhepTinh('*')"
      >
        ×
      </button>

      <button
        class="btn"
        onclick="nhapSo('4')"
      >
        4
      </button>

      <button
        class="btn"
        onclick="nhapSo('5')"
      >
        5
      </button>

      <button
        class="btn"
        onclick="nhapSo('6')"
      >
        6
      </button>

      <button
        class="btn btn-operator"
        onclick="chonPhepTinh('-')"
      >
        −
      </button>

      <button
        class="btn"
        onclick="nhapSo('1')"
      >
        1
      </button>

      <button
        class="btn"
        onclick="nhapSo('2')"
      >
        2
      </button>

      <button
        class="btn"
        onclick="nhapSo('3')"
      >
        3
      </button>

      <button
        class="btn btn-operator"
        onclick="chonPhepTinh('+')"
      >
        +
      </button>

      <button
        class="btn btn-zero"
        onclick="nhapSo('0')"
      >
        0
      </button>

      <button
        class="btn"
        onclick="nhapDauCham()"
      >
        .
      </button>

      <button
        class="btn btn-equal"
        onclick="tinhKetQua()"
      >
        =
      </button>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
      </div>
    </div>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js/b16.js"></script>
  </body>
</html>
