<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>JS - toán tử lodic , cấu trúc điều kiện</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- link CSS -->
  </head>

  <body>
    <div class="row d-flex justify-content-center mb-5">
      <div class="col-6">
        <div class="card shadow">
          <div class="card-header bg-primary text-light">
            <h4 class="mb-0">Kiểm tra độ tuổi lái xe >50cc</h4>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="" class="form-label">Nhập độ tuổi</label>
              <input
                type="number"
                class="form-control"
                id="age"
                aria-describedby="helpId"
                placeholder="Nhập tuổi"
              />
            </div>
            <button id="checkAge" class="btn btn-primary">Kiểm tra</button>
            <!--  kết quả -->
            <div id="result1" class=""></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row d-flex justify-content-center mb-5">
      <div class="col-6">
        <div class="card shadow">
          <div class="card-header bg-success text-light">
            <h4 class="mb-0">Xếp loại</h4>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label for="" class="form-label">Nhập điểm toán</label>
              <input
                type="number"
                class="form-control"
                id="dtoan"
                aria-describedby="helpId"
                placeholder="Nhập điểm toán"
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Nhập điểm lý</label>
              <input
                type="number"
                class="form-control"
                id="dly"
                aria-describedby="helpId"
                placeholder="Nhập điểm lý"
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Nhập điểm hoá</label>
              <input
                type="number"
                class="form-control"
                id="dhoa"
                aria-describedby="helpId"
                placeholder="Nhập điểm hoá"
              />
            </div>
            <button id="check2" class="btn btn-success">Kiểm tra</button>
            <!--  kết quả -->
            <div id="result2" class=""></div>
          </div>
        </div>
      </div>
    </div>
     <div class="row d-flex justify-content-center mb-5">
      <div class="col-6">
        <div class="card shadow">
          <div class="card-header bg-info text-light">
            <h4 class="mb-0">Tính Hoa Hồng</h4>
          </div>
          <div class="card-body">
            
            <div class="mb-3">
              <label for="" class="form-label">Nhập tổng doanh số</label>
              <input
                type="number"
                class="form-control"
                id="doanhSo"
                aria-describedby="helpId"
                placeholder="Nhập tổng doanh số"
              />
            </div>
            <div class="mb-3">
              <label for="" class="form-label">Số lượng sản phẩm</label>
              <input
                type="number"
                class="form-control"
                id="soLuong"
                aria-describedby="helpId"
                placeholder="Nhập số sản phẩm bán được"
              />
            </div>
            <button id="check3" class="btn btn-info">Kiểm tra</button>
            <!--  kết quả -->
            <div id="result3" class=""></div>
          </div>
        </div>
      </div>
    </div>
     <div class="row d-flex justify-content-center mb-5">
      <div class="col-6">
        <div class="card shadow">
          <div class="card-header bg-warning bg-opacity-75 text-light">
            <h4 class="mb-0">Kiểm tra số chẵn / lẻ</h4>
          </div>
          <div class="card-body">
            
            <div class="mb-3">
              <label for="" class="form-label">Số cần kiểm tra</label>
              <input
                type="number"
                class="form-control"
                id="soChanLe"
                aria-describedby="helpId"
                placeholder="Nhập số cần kiểm tra"
              />
            </div>
            <!--  kết quả -->
            <div id="result4" class="alert alert-info"></div>
          </div>
        </div>
      </div>
    </div>


    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Link js -->
    <script src="./js/index.js"></script>
  </body>
</html>
